# ~/.tmux.conf
# Save tmux sessions
# 1. List of plugins (TPM required)
set -g @plugin 'tmux-plugins/tpm'

# 2. Plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# 3. Secure path so macOS doesn't wipe your saves on reboot
set -g @resurrect-dir '~/.tmux/resurrect_saves'

# Auto-save every 15 min (manual restore with prefix + Ctrl+r)
set -g @continuum-save-interval '15'

# Theme
set -g @plugin 'catppuccin/tmux'

# Use window name (#W) instead of pane title (#T) — catppuccin defaults to #T
# which changes on every prompt because oh-my-posh sets the terminal title
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Override battery/cpu text to call scripts directly — tmux-battery/cpu only scan
# status-right/left for placeholders and can't reach inside catppuccin's nested options
set -g @catppuccin_battery_icon "#(~/.tmux/plugins/tmux-battery/scripts/battery_icon_status.sh) "
set -g @catppuccin_battery_text " #(~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh)"
set -g @catppuccin_cpu_text " #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)"

# Catppuccin status bar widgets
set -g status-right "#{E:@catppuccin_status_cpu}#{E:@catppuccin_status_battery}#{E:@catppuccin_status_date_time}"
set -g status-left "#{E:@catppuccin_status_session}"

# Status bar position
set -g status-position top

# Load flavor from ~/.tmux/flavor (defaults to mocha)
run-shell 'tmux set -g @catppuccin_flavor "$(cat ~/.tmux/flavor 2>/dev/null || echo mocha)"'

# Theme switching: prefix + T cycles latte → frappe → macchiato → mocha → latte
bind T run-shell '\
  cur=$(cat ~/.tmux/flavor 2>/dev/null || echo mocha); \
  case "$cur" in \
    latte)     next=frappe ;; \
    frappe)    next=macchiato ;; \
    macchiato) next=mocha ;; \
    *)         next=latte ;; \
  esac; \
  echo $next > ~/.tmux/flavor && \
  tmux set -g @catppuccin_flavor $next && \
  tmux set -g @catppuccin_reset true && \
  ~/.tmux/plugins/tmux/catppuccin.tmux && \
  tmux set -g mode-style reverse && \
  tmux set -gF window-style "bg=#{@thm_mantle}" && \
  tmux set -gF window-active-style "bg=#{@thm_base}" && \
  tmux display-message "Theme: $next"'

# 4. Initialize TMUX plugin manager (Keep this at the very bottom!)
run '~/.tmux/plugins/tpm/tpm'
run-shell 'tmux set -g mode-style reverse'
set -g allow-set-title off
run-shell 'tmux set -gF window-style "bg=#{@thm_mantle}" && tmux set -gF window-active-style "bg=#{@thm_base}"'


# Keep window names as manually set
set -g automatic-rename off

# Enable mouse scroll
# If you desire to select texts, hold shift + click
set -g mouse on

# Enable vi keys in window modes (e.g., copy/scroll mode)
set-window-option -g mode-keys vi

# Enable clipboard sync
set -s set-clipboard on

#  Explicitly bind the paste behavior to use the OS clipboard
# For MacOS
# bind ] run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"
# For Linux
# bind ] run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"


